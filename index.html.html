<!DOCTYPE html>

<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#e4e8ec;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:36px}
.card{background:#0D1B2A;color:#E8EDF3;border-radius:24px;padding:36px 30px 30px;width:100%;max-width:360px}
.bar{width:36px;height:3px;background:#4A9EFF;border-radius:2px;margin-bottom:26px}
.name{font-family:'Playfair Display',serif;font-size:36px;font-weight:500;letter-spacing:-0.01em;line-height:1.15;margin-bottom:6px}
.role{font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.5;margin-bottom:4px}
.company{font-size:14px;font-weight:500;opacity:.75;margin-bottom:32px}
.divider{height:1px;background:rgba(255,255,255,0.1);margin-bottom:24px}
.contacts{display:flex;flex-direction:column;gap:14px;margin-bottom:32px}
.contact-row{display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;font-size:14px}
.icon{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.save-btn{display:block;width:100%;padding:15px;text-align:center;background:#4A9EFF;color:#0D1B2A;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:.05em;text-decoration:none}
.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.qr-box{background:white;border-radius:16px;padding:14px}
.qr-label{font-size:12px;color:#888;text-align:center}
</style>
</head>
<body>

<div class="card">
  <div class="bar"></div>

  <div class="role">CEO</div>
  <div class="company">Zbogo Ja</div>
  <div class="divider"></div>
  <div class="contacts">
    <a href="tel:+355692090613" class="contact-row">

      </div>

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E8EDF3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
      </div>
      zbogoja@yahoo.com

</div>

<div class="qr-wrap">
  <div class="qr-box" id="qrcode"></div>
  <div class="qr-label">Scan to open this card on any phone</div>
</div>

<script>
const src = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Jani Zbogo</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:#e4e8ec;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}.card{background:#0D1B2A;color:#E8EDF3;border-radius:24px;padding:36px 30px 30px;width:100%;max-width:360px;animation:up .4s ease both}.bar{width:36px;height:3px;background:#4A9EFF;border-radius:2px;margin-bottom:26px}.name{font-family:'Playfair Display',serif;font-size:36px;font-weight:500;letter-spacing:-0.01em;line-height:1.15;margin-bottom:6px}.role{font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.5;margin-bottom:4px}.company{font-size:14px;font-weight:500;opacity:.75;margin-bottom:32px}.divider{height:1px;background:rgba(255,255,255,0.1);margin-bottom:24px}.contacts{display:flex;flex-direction:column;gap:14px;margin-bottom:32px}.row{display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;font-size:14px}.icon{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0}.save{display:block;width:100%;padding:15px;text-align:center;background:#4A9EFF;color:#0D1B2A;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:.05em;text-decoration:none}@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}</style></head><body><div class="card"><div class="bar"></div><div class="name">Jani Zbogo</div><div class="role">CEO</div><div class="company">Zbogo Ja</div><div class="divider"></div><div class="contacts"><a href="tel:+355692090613" class="row"><div class="icon"><svg width="16" heig const url = URL.createObjectURL(blob);
